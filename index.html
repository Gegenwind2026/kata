<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shotokan Kata Random Generator</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ff7a18" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kata" />
  <link rel="apple-touch-icon" href="icon-192.png?v=2" />

  <style>
    :root {
      --bg: #0b0f19;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.16);
      --text: #f7f7fb;
      --muted: #a8b0c4;
      --accent: #ff7a18;
      --accent-2: #ffb347;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 122, 24, 0.25), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 179, 71, 0.16), transparent 34%),
        linear-gradient(135deg, #080b12 0%, #111827 100%);
      display: grid;
      place-items: center;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }

    main { width: min(720px, 100%); }

    .card {
      position: relative;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(24px, 5vw, 48px);
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(120deg, transparent, rgba(255, 122, 24, 0.16), transparent);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-2);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4.25rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .subtitle {
      margin: 18px auto 34px;
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.6;
    }

    .result-box {
      min-height: 150px;
      display: grid;
      place-items: center;
      margin: 0 auto 28px;
      padding: 28px 20px;
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.26);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    #result {
      margin: 0;
      font-size: clamp(2.1rem, 8vw, 5rem);
      line-height: 1;
      letter-spacing: -0.06em;
      font-weight: 900;
      text-wrap: balance;
    }

    #hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .btn {
      border: 0;
      cursor: pointer;
      color: #17110a;
      font-weight: 900;
      font-size: 1.1rem;
      padding: 17px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 14px 36px rgba(255, 122, 24, 0.32);
      transform: translateY(0);
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 18px 48px rgba(255, 122, 24, 0.42); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.72; cursor: wait; transform: none; }

    .history {
      margin-top: 28px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.86rem;
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: rgba(255, 255, 255, 0.46);
      font-size: 0.82rem;
    }

    #install-banner {
      display: none;
      margin-top: 18px;
      padding: 12px 18px;
      border-radius: 16px;
      background: rgba(255, 122, 24, 0.12);
      border: 1px solid rgba(255, 122, 24, 0.3);
      color: var(--accent-2);
      font-size: 0.9rem;
      align-items: center;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    #install-banner.visible { display: flex; }

    #install-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #17110a;
      border: 0;
      border-radius: 999px;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .kofi-wrap {
      margin-top: 24px;
      text-align: center;
    }

    .kofi-btn {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 999px;
      border: 1px solid rgba(74, 222, 128, 0.4);
      background: rgba(74, 222, 128, 0.1);
      color: #4ade80;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .kofi-btn:active { opacity: 0.7; transform: scale(0.97); }

    .kofi-hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.03); opacity: 0.88; }
    }

    .rolling #result { animation: pulse 220ms ease-in-out infinite; }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="title">
      <div class="content">
        <div class="eyebrow">🥋 Shotokan · 26 Kata</div>
        <h1 id="title"></h1>
        <p class="subtitle" id="subtitle"></p>

        <div class="result-box" id="resultBox" aria-live="polite">
          <div>
            <p id="result"></p>
            <p id="hint"></p>
          </div>
        </div>

        <button class="btn" id="drawButton" type="button"></button>

        <div class="history" id="history" hidden>
          <strong id="historyLabel"></strong>
          <div class="history-list" id="historyList"></div>
        </div>

        <div id="install-banner">
          <span id="installText"></span>
          <button id="install-btn" type="button" id="installBtnLabel"></button>
        </div>

        <div class="kofi-wrap">
          <a href="https://ko-fi.com/matthias98398" target="_blank" class="kofi-btn">☕ Thanks!</a>
          <p class="kofi-hint" id="kofiHint"></p>
        </div>
      </div>
    </section>
    <div class="footer" id="footer"></div>
  </main>

  <script>
    // ── Sprache ──────────────────────────────────────────────
    const de = navigator.language.startsWith('de');

    const t = {
      title:        de ? 'Kata Zufallsgenerator'   : 'Kata Random Generator',
      subtitle:     de ? 'Drücke den Button und der Generator zieht zufällig eine Shotokan-Kata für Training, Prüfungsvorbereitung oder Wettkampf-Auswahl.'
                       : 'Press the button and the generator randomly selects a Shotokan kata for training, exam preparation or competition.',
      ready:        de ? 'Bereit?'                 : 'Ready?',
      noKata:       de ? 'Noch keine Kata gezogen.': 'No kata drawn yet.',
      draw:         de ? 'Kata auswählen'          : 'Draw Kata',
      drawing:      de ? 'Auswahl läuft …'         : 'Drawing …',
      deciding:     de ? 'Der Zufall entscheidet …': 'Let fate decide …',
      drawn:        n  => de ? `Gezogen aus ${n} Shotokan-Kata.` : `Drawn from ${n} Shotokan kata.`,
      drawAgain:    de ? 'Neue Kata auswählen'     : 'Draw again',
      history:      de ? 'Letzte Ziehungen'        : 'Recent draws',
      install:      de ? '📲 Als App auf dem Homescreen installieren' : '📲 Add to Home Screen',
      installBtn:   de ? 'Installieren'            : 'Install',
      kofi:         de ? 'Spenden unterstützen den Karateverein Kashiwa Großenhain 🥋'
                       : 'Donations support Karate Club Kashiwa Großenhain 🥋',
      footer:       de ? 'Funktioniert offline · Als App installierbar'
                       : 'Works offline · Installable as app',
    };

    document.documentElement.lang = de ? 'de' : 'en';
    document.getElementById('title').textContent       = t.title;
    document.getElementById('subtitle').textContent    = t.subtitle;
    document.getElementById('result').textContent      = t.ready;
    document.getElementById('hint').textContent        = t.noKata;
    document.getElementById('drawButton').textContent  = t.draw;
    document.getElementById('historyLabel').textContent= t.history;
    document.getElementById('installText').textContent = t.install;
    document.getElementById('install-btn').textContent = t.installBtn;
    document.getElementById('kofiHint').textContent    = t.kofi;
    document.getElementById('footer').textContent      = t.footer;

    // ── Kata-Liste ───────────────────────────────────────────
    const katas = [
      "Heian Shodan", "Heian Nidan", "Heian Sandan", "Heian Yondan", "Heian Godan",
      "Tekki Shodan", "Tekki Nidan", "Tekki Sandan",
      "Bassai Dai", "Bassai Sho",
      "Kanku Dai", "Kanku Sho",
      "Empi", "Hangetsu", "Jion", "Jitte", "Jiin", "Chinte",
      "Gankaku", "Nijushiho", "Sochin", "Wankan", "Meikyo",
      "Gojushiho Dai", "Gojushiho Sho", "Unsu"
    ];

    const result      = document.getElementById("result");
    const hint        = document.getElementById("hint");
    const button      = document.getElementById("drawButton");
    const resultBox   = document.getElementById("resultBox");
    const history     = document.getElementById("history");
    const historyList = document.getElementById("historyList");
    const banner      = document.getElementById("install-banner");
    const installBtn  = document.getElementById("install-btn");

    const recent = [];
    let lastIndex = -1;
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      banner.classList.add('visible');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      if (outcome === 'accepted') banner.classList.remove('visible');
    });

    window.addEventListener('appinstalled', () => banner.classList.remove('visible'));

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

    function randomIndex(max) {
      if (crypto?.getRandomValues) {
        const a = new Uint32Array(1);
        crypto.getRandomValues(a);
        return a[0] % max;
      }
      return Math.floor(Math.random() * max);
    }

    function drawRandomKata() {
      button.disabled = true;
      button.textContent = t.drawing;
      resultBox.classList.add("rolling");
      hint.textContent = t.deciding;

      let ticks = 0;
      const interval = setInterval(() => {
        result.textContent = katas[randomIndex(katas.length)];
        if (++ticks >= 18) {
          clearInterval(interval);
          let fi = randomIndex(katas.length);
          while (katas.length > 1 && fi === lastIndex) fi = randomIndex(katas.length);
          lastIndex = fi;
          const selected = katas[fi];
          result.textContent = selected;
          hint.textContent = t.drawn(katas.length);
          resultBox.classList.remove("rolling");
          button.disabled = false;
          button.textContent = t.drawAgain;
          addToHistory(selected);
        }
      }, 70);
    }

    function addToHistory(kata) {
      recent.unshift(kata);
      if (recent.length > 6) recent.pop();
      history.hidden = false;
      historyList.innerHTML = "";
      recent.forEach(item => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = item;
        historyList.appendChild(chip);
      });
    }

    button.addEventListener("click", drawRandomKata);
  </script>
</body>
</html>
